# =============================================================================
# Qwen3-TTS Nigerian VoiceDeck — Architecture Flow (v4)
# =============================================================================
# v1: GitHub Actions + GHCR — blocked by GitHub billing hold
# v2: Local Docker build on Runpod VM — blocked by insufficient disk space
# v3: Docker Hub Automated Builds — deprecated + requires paid plan
# v4: Google Cloud Build — builds on GCP infrastructure, 120 free min/day
#
# Final flow: Push code to GitHub → Cloud Build triggers → builds →
#             pushes to Docker Hub → Vast pulls image from Docker Hub
#
# Cold start drops from 0-7 min (unpredictable) to ~5-60 sec (predictable).
# =============================================================================

metadata:
  title: "Qwen3-TTS Deployment Architecture — Custom Docker Image + Template (v4)"
  status: "active"
  date: "2026-07-16"
  previous_approaches:
    - "v1: tarball + onstart_cmd (abandoned — 4 failure points at boot)"
    - "v2: GitHub Actions + GHCR (blocked — GitHub billing hold)"
    - "v3: Local build on Runpod VM (blocked — disk space insufficient)"
    - "v3b: Docker Hub Automated Builds (blocked — deprecated, requires paid plan)"

# =============================================================================
# WHY THE OLD APPROACH FAILED
# =============================================================================
problems_with_tarball_approach:
  summary: >
    The current approach (curl tarball + pip install at boot) has too many
    independent failure points, each one introducing delay and unpredictability.

  flow: |
    Vast picks host
         │
         ▼
    Pull vastai/pytorch (5GB)  ← cached on some hosts, not on others
         │                        → 0 sec if cached, 3-7 min if not
         ▼
    Container starts
         │
         ▼
    curl tarball (22KB)        ← depends on GitHub raw availability
         │                        → ~2 sec normally, may timeout
         ▼
    tar extract                 ← ~0.5 sec
         │
         ▼
    pip install -r reqs.txt    ← depends on PyPI + network speed
         │                        → 1-3 min, may timeout mid-way
         ▼
    python serve.py             ← port 8000 finally opens
         │                        → may fail if pip install corrupted
         ▼
    ❌ Ready (unreliable)

  failure_count: 4 independent network-dependent steps
  cold_start_range: "30 seconds to 7+ minutes (random based on host)"
  port_issue: >
    Port mapping is created by Vast when the container starts, but serve.py
    doesn't begin listening until pip install finishes. The user sees the port
    but nothing responds — looks like "port not available."

# =============================================================================
# THE NEW APPROACH — GOOGLE CLOUD BUILD
# =============================================================================
solution:
  summary: >
    Bake everything into a Docker image at build time. Google Cloud Build's
    free tier (120 min/day, no cost) watches the GitHub repo. On every push
    to main, Cloud Build checks out the code, builds the Dockerfile on GCP
    infrastructure, and pushes the resulting image to Docker Hub.
    No local Docker needed. No GitHub Actions needed. No disk space needed.
    Boot becomes: pull image → run container → serve.py is already listening.

  flow: |
    ╔══════════════════════════════════════════════════════════════╗
    ║            BUILD TIME (Google Cloud Build, free tier)       ║
    ╚══════════════════════════════════════════════════════════════╝

    User pushes code to GitHub (main branch)
         │
         ▼
    Cloud Build trigger detects push
         │   (one-time setup: GitHub → GCP trigger)
         │
         ▼
    Cloud Build provisions e2-standard-2 runner (2 vCPU, 8 GB)
         │
         ▼
    1. docker build
         │   FROM vastai/pytorch:cuda-12.6.3-auto   ← ~10 min pull (8.9GB)
         │   COPY . /workspace/qwen3-tts
         │   RUN pip install -r requirements.txt
         │   CMD ["python", "serve.py"]
         │
         ▼
    2. docker login (via Secret Manager token)
         │
         ▼
    3. docker push docker.io/cybocrime/qwen3-tts:latest
         │
         ▼
    ✅ Image ready on Docker Hub — world accessible, free pulls
         │   Total build time: ~12-15 min
         │   Free tier: 120 min/day = ~8 builds/day

    ╔══════════════════════════════════════════════════════════════╗
    ║                BOOT TIME (Vast AI)                          ║
    ╚══════════════════════════════════════════════════════════════╝

    User creates Vast template (one-time):
         │   Image: docker.io/cybocrime/qwen3-tts:latest
         │   Port: 8000
         │   Launch mode: docker ENTRYPOINT
         │
         ▼
    User launches instance via template
         │
         ▼
    Vast assigns host machine (RTX 4090, $0.31/hr)
         │
         ▼
    Docker pull docker.io/cybocrime/qwen3-tts:latest
         │   Layer 1: vastai/pytorch (5GB)  ← CACHED on most Vast hosts!
         │   Layer 2: our code (50KB)       ← Tiny, fast pull
         │   Layer 3: pip installed deps    ← <300MB, fast pull
         │   ↓ ↓ ↓
         │   ⚡ If Layer 1 cached: pull takes ~5-10 seconds
         │   ⚡ If nothing cached: pull takes ~1-2 minutes
         │
         ▼
    Container starts with ENTRYPOINT
         │   serve.py immediately listening on port 8000
         │
         ▼
    ✅ Ready (predictable, fast)
         │   Port 8000 is LIVE — no setup script delaying it

  cold_start_range: "5 seconds to 2 minutes (predictable, depends on host cache)"
  failure_count: 1 step (Docker pull — single atomic operation)

# =============================================================================
# WHY DOCKER LAYER CACHING WORKS ON VAST
# =============================================================================
layer_caching_explanation:
  how_it_works: >
    Docker images are composed of read-only layers. Each layer is identified
    by a content hash. When a Vast host pulls an image, it checks if each
    layer already exists on disk. If yes, it skips the download.

  why_vastai_pytorch_is_cached: >
    Vast AI recommends vastai/pytorch as their primary base image. Thousands
    of users have pulled it on thousands of hosts. Most hosts in Vast's fleet
    already have this image cached. When our Docker image uses
    FROM vastai/pytorch, that layer is hash-identical to what's cached.
    Result: zero download for the 5GB base.

  what_happens_on_first_boot: |
    Host A (vastai/pytorch cached):
      Layer 1:  CACHED → 0 sec
      Layer 2:  50KB     → <1 sec
      Layer 3:  200MB    → ~5-10 sec
      Total:             → ~10 sec

    Host B (nothing cached):
      Layer 1:  5GB      → 1-3 min
      Layer 2:  50KB     → <1 sec
      Layer 3:  200MB    → ~10 sec
      Total:             → ~2 min max

  benefit_over_current: |
    Current: curl + pip at boot = fragile, 4 failure points
    Proposed: Docker pull = single atomic operation, retry built into Docker

# =============================================================================
# COMPONENTS
# =============================================================================
components:
  - name: "Google Cloud Build"
    location: "console.cloud.google.com/cloud-build"
    purpose: "Builds Docker image on every push to GitHub main branch"
    free_tier: "120 build-minutes/day (e2-standard-2 runner)"
    setup_done: false

  - name: "cloudbuild.yaml"
    location: "/home/cybocrime/runpod/qwen3-tts-serverless-nigerian/cloudbuild.yaml"
    purpose: "Cloud Build config — builds Docker image and pushes to Docker Hub"

  - name: "Dockerfile"
    location: "/home/cybocrime/runpod/qwen3-tts-serverless-nigerian/Dockerfile"
    purpose: "Defines the custom Docker image with all dependencies pre-installed"

  - name: "GitHub Repository"
    location: "github.com/LogiSynthArchitect/qwen3-tts-serverless-nigerian"
    purpose: "Source of truth — push code here, Cloud Build picks it up"

  - name: "Docker Hub Registry"
    location: "hub.docker.com/r/cybocrime/qwen3-tts"
    purpose: "Final image storage — free, unlimited public pulls"
    image: "docker.io/cybocrime/qwen3-tts:latest"

  - name: "Vast AI Template"
    location: "https://cloud.vast.ai/templates/ (web UI)"
    purpose: "Reusable configuration to launch instances with our custom image"
    settings:
      image: "docker.io/cybocrime/qwen3-tts:latest"
      port: "8000"
      launch_mode: "docker ENTRYPOINT"
      disk: "30GB"
      label: "qwen3-tts"

# =============================================================================
# COMPARISON TABLE
# =============================================================================
comparison:
  - aspect: "Cold start time"
    current: "30s – 7min (random)"
    proposed: "5s – 2min (predictable)"

  - aspect: "Failure points at boot"
    current: "4 (Docker pull + curl + extract + pip install)"
    proposed: "1 (Docker pull only)"

  - aspect: "Port reliability"
    current: "Port 8000 not listening until pip install finishes"
    proposed: "Port 8000 listening immediately with container"

  - aspect: "Image storage"
    current: "22KB tarball on GitHub raw"
    proposed: "Full Docker image on Docker Hub (free)"

  - aspect: "Dependency install"
    current: "At boot time (pip install = slow, fragile)"
    proposed: "At build time (baked into image = never fails at boot)"

  - aspect: "Version management"
    current: "Tarball overwritten, no versioning"
    proposed: "Docker tags (latest, v1.0.0, etc.)"

  - aspect: "Works on Runpod?"
    current: "Yes (tarball approach)"
    proposed: "Yes (same image, different Vast template)"

  - aspect: "Build location"
    current: "At boot on Vast host"
    proposed: "Google Cloud Build (free, 120 min/day)"

