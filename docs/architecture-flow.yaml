  - "2. Write Dockerfile in project root"
  - "3. Create .github/workflows/build.yml for GitHub Actions CI"
  - "4. Push both files to GitHub — CI triggers automatically"
  - "5. Verify image appears in GHCR packages"
  - "6. Create Vast AI template via web UI referencing ghcr.io image"
  - "7. Launch test instance from template, verify /tts endpoint"
  - "8. Write stop_pod script to halt billing after session"
