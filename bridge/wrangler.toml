name = "qwen3tts-openai-bridge"
main = "worker.js"
compatibility_date = "2024-01-01"

# Environment variables (set via `npx wrangler secret put <NAME>`)
# RunPod configuration
# RUNPOD_URL = "https://api.runpod.ai/v2/some-id"
# RUNPOD_API_KEY = "runpod-api-key"
# Optional: Authentication
# AUTH_TOKEN = "your-optional-auth-token"

# R2 storage (optional, for voice audio files)
# [[r2_buckets]]
# binding = "VOICE_FILES"
# bucket_name = "qwen3tts-voices"

[vars]
ENVIRONMENT = "production"

[observability.logs]
enabled = false
invocation_logs = true
