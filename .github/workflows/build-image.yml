name: Build & push Qwen3-TTS Vast image

# Builds the baked Docker image (deps + app code inside the image layers) and
# pushes it to GHCR. Runs entirely in GitHub's cloud runners -> no local docker
# needed, nothing touches the user's PC. Vast.ai then pulls ghcr.io/<owner>/<repo>:latest
# as the instance image, eliminating the ~7min onstart pip install.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "serve.py"
      - "handler.py"
      - "inference.py"
      - "config.py"
      - "bridge/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: meta
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.name }}:latest
            ${{ steps.meta.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
