# =============================================================================
# Google Cloud Build config — Qwen3-TTS Docker image
#
# Trigger: push to main branch (works via git push to GitHub)
# Builds:  docker build → push to Docker Hub (free)
# Auth:    Docker Hub token stored in Google Secret Manager
# =============================================================================
steps:
  # Step 1: Build VoiceDesign image (Dockerfile) with SHA and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'docker.io/cybocrime/qwen3-tts:$SHORT_SHA'
      - '-t'
      - 'docker.io/cybocrime/qwen3-tts:latest'
      - '.'

  # Step 2: Build Base (voice clone) image from Dockerfile.base
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.base'
      - '-t'
      - 'docker.io/cybocrime/qwen3-tts:base-$SHORT_SHA'
      - '-t'
      - 'docker.io/cybocrime/qwen3-tts:base'
      - '.'

  # Step 3: Login + push all four tags in one step (each GCB step
  # is a fresh container — login credentials don't survive across steps)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$DOCKER_HUB_TOKEN" | docker login -u cybocrime --password-stdin
        docker push docker.io/cybocrime/qwen3-tts:latest
        docker push docker.io/cybocrime/qwen3-tts:$SHORT_SHA
        docker push docker.io/cybocrime/qwen3-tts:base
        docker push docker.io/cybocrime/qwen3-tts:base-$SHORT_SHA
    secretEnv: ['DOCKER_HUB_TOKEN']

# Pull Docker Hub token from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DOCKER_HUB_TOKEN/versions/latest
      env: DOCKER_HUB_TOKEN

# 30 min timeout (base image pull is ~10-15 min)
timeout: '1800s'

# Use GCS-only logging (required when using a custom service account)
options:
  logging: GCS_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
