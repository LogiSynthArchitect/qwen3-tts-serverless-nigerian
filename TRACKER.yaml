      Cloud Build (Dockerfile.base) and Vast deployment. No actual clone audio
      yet — all ref tests used synthetic placeholders. Understanding of Qwen3-TTS
      cloning API solidified: create_voice_clone_prompt(ref_audio, ref_text) →
      VoiceClonePromptItem; generate_voice_clone(text, voice_clone_prompt) reuses
      the cached prompt; ref_text IS REQUIRED (not optional).
    decisions:
      - "Voice clone requires Base model variant (MODEL_TYPE=Base)"
      - "Ref audio must be WAV 24kHz, single speaker, verbatim transcript"
      - "Clone prompt cached at startup — ONE prompt per voice_id, reused for every generation"
      - "Dockerfile.base for separate :base image tag"
    actions:
