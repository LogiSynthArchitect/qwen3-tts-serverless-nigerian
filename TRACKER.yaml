# =============================================================================
# Qwen3-TTS Serverless Nigerian — Operation Tracker
#
# Each BEAT is a chronologically-ordered entry documenting what was understood,
# decided, and done at that moment. Use this to answer "what happened?" with
# precision.
#
# Format:
#   beat:      <int>           — sequential number (never reused)
#   timestamp: <ISO 8601>      — when this beat was recorded
#   title:     <string>        — one-line summary
#   context:   <text>          — what was understood at that point
#   decisions: <list of text>  — what was settled
#   actions:   <list of text>  — what was executed
#   blockers:  <list of text>  — what is blocking progress (empty = none)
#   plan:      <list of text>  — what happens next
# =============================================================================
tracker:
  - beat: 1
    timestamp: "2026-07-16T04:14:00Z"
    title: "Project inception — Qwen3-TTS voice cloning via RunPod"
    context: >
      Goal: deploy Qwen3-TTS as a serverless endpoint for African-accented TTS.
      Initial approach: RunPod Serverless with GitHub integration (build via
      RunPod console, no local Docker). Model fork by sruckh (Apache 2.0).
      Discovered three model modes: VoiceDesign (text descriptions, presets),
      CustomVoice (6 built-in speakers), Base (reference-audio voice cloning).
      VoiceDesign chosen for initial deployment (quickest path).
    decisions:
      - "Use RunPod Serverless GitHub integration for auto-build"
      - "Deploy VoiceDesign model first (20 presets) as minimal viable TTS"
    actions:
      - "Pushed code to LogiSynthArchitect/qwen3-tts-serverless-nigerian on GitHub"
      - "Connected RunPod endpoint via Import Git Repository"
      - "Dockerfile written with pip install of qwen-tts --no-deps + bounded deps"
    blockers: []
    plan:
      - "Get endpoint building successfully on RunPod"
      - "Test first TTS generation via curl"
      - "Iterate on VoiceDesign presets"

  - beat: 2
    timestamp: "2026-07-16T05:30:35Z"
    title: "Pivot to Google Cloud Build — RunPod builder unreliable"
    context: >
      RunPod GitHub integration has no API, no logs, and timed out. Also,
      RunPod Serverless @remote pattern is function-based (not container
      HTTP), incompatible with serve.py. Switched strategy: use Google Cloud
      Build to build Docker image, push to Docker Hub, then deploy on
      Vast.ai (full GPU container, HTTP server runs as-is).
    decisions:
      - "Google Cloud Build → Docker Hub → Vast.ai triple flow"
      - "cloudbuild.yaml with SHA + latest tags, Docker Hub auth via Secret Manager"
      - "Vast.ai compute (RTX 4090) via py project template"
    actions:
      - "Created cloudbuild.yaml (Docker Hub push, GCS logging)"
      - "Created Vast deployment scripts (deploy_vast.py, run_pod.py)"
      - "Pushed image cybocrime/qwen3-tts:latest to Docker Hub via Cloud Build"
      - "Created Vast template #506680 'Qwen3-TTS VoiceDesign'"
    blockers:
      - "Vast 2FA required — resolved within same session"
    plan:
      - "Deploy to Vast, verify /health and /voices endpoints"
      - "Produce first TTS audio to confirm end-to-end"

  - beat: 3
    timestamp: "2026-07-17T10:48:42Z"
    title: "Vast deployment proven — TTS working end-to-end"
    context: >
      Deployed cybocrime/qwen3-tts:latest (VoiceDesign model) to Vast instance
      45160836 (New York, RTX 4090, ssh_direct runtype). Image built via Google
      Cloud Build, pushed to Docker Hub, pulled by Vast template. First health
      check took 4–6 min (model weights download from HuggingFace on first start),
      first audio generation took 5–7 min (PyTorch CUDA JIT warm-up). After
      warm-up: ~10-20 sec per generation. Produced a 107-word story in 3 voices
      (ng_male_lagos_warm, ng_female_lagos_bright, us_female_general) as valid
      24kHz MP3. Documented all quirks in DEPLOYMENT_LESSONS.md.
    decisions:
      - "ssh_direct runtype (not 'args') — keeps serve.py alive"
      - "Port mapping 8000->40051 via Vast template"
      - "Pinned torch 2.6.0+cu124 for CUDA 12.7 driver compatibility"
    actions:
      - "Deployed to Vast, verified /health and /voices (24 presets)"
      - "Generated 20 VoiceDesign presets catalogued in bridge/voices_presets.json"
      - "Generated 3 story samples saved to generated_audio/"
      - "Wrote DEPLOYMENT_LESSONS.md (cold-start, 3 bugs, API usage, checklist)"
      - "Wrote MESH_SHEET.md (v4 architecture, API surface, deploy record)"
    blockers: []
    plan:
      - "Move to voice cloning phase (Base model, real CC0 audio)"
      - "Write inference.py cloning functions (preload_clone_voices, resolve_cloned_voice, etc.)"
      - "Write Dockerfile.base for Base model variant"

  - beat: 4
    timestamp: "2026-07-17T11:52:33Z"
    title: "Voice cloning infra built — code only, not deployed"
    context: >
      Wrote all cloning infrastructure: voice registry (voices_cloned.json),
      inference preloader (preload_clone_voices, get_clone_prompt,
      resolve_cloned_voice, get_cloned_voices, create_voice_clone_prompt,
      generate_voice_clone), handler voice_clone routing, serve.py /clone-voices
